{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg border-0">
            <div class="text-center mb-4">
                <h2 class="text-primary fw-bold">Crear Cuenta</h2>
                <p class="text-muted">Únete a nuestra plataforma médica</p>
            </div>
            <form action="/register" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre Completo</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej. Dr. Alex Pascual" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <input type="email" name="correo" class="form-control" placeholder="nombre@ejemplo.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Registrarse</button>
            </form>
            <hr class="my-4">
            <p class="text-center mb-0">¿Ya tienes cuenta? <a href="/login" class="text-decoration-none">Inicia sesión</a></p>
        </div>
    </div>
</div>
{% endblock %}
