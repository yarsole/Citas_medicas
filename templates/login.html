{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg border-0">
            <div class="text-center mb-4">
                <h2 class="text-primary fw-bold">Bienvenido</h2>
                <p class="text-muted">Inicia sesión para gestionar tus citas</p>
            </div>
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <input type="email" name="correo" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Ingresar al Sistema</button>
            </form>
            <p class="text-center mt-4 mb-0 small">¿Nuevo aquí? <a href="/register" class="text-decoration-none">Crea una cuenta</a></p>
        </div>
    </div>
</div>
{% endblock %}
